name: Docker Build and Publish

on:
  # Allow this workflow to be called from other workflows
  workflow_call:
    inputs:
      version:
        description: 'Version tag (e.g., 1.2.3)'
        required: false
        type: string
      tag_name:
        description: 'Git tag name (e.g., v1.2.3)'
        required: false
        type: string
  # Trigger on release creation (integrates with release-please)
  release:
    types: [published]
  # Trigger on version tags
  push:
    tags:
      - 'v*.*.*'
  # Allow manual trigger for testing and nightly builds
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.2.3, or "nightly" for an untagged-as-latest build)'
        required: false
        type: string
      tag_name:
        description: 'Git tag name (e.g., v1.2.3)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Optional Docker Hub mirror target for the monolith (best-effort).
  DOCKERHUB_IMAGE: dastron/video-ware

jobs:
  # ---------------------------------------------------------------------------
  # Build each architecture natively (no QEMU) and push by digest.
  # amd64 runs on ubuntu-latest, arm64 on the free public-repo arm runner.
  # The two jobs run in parallel; each builds all four targets once.
  # ---------------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Labels (and annotations) baked into each per-arch image. Tags are
      # applied later on the merged manifest, so they are irrelevant here.
      - name: Metadata - monolith
        id: meta-monolith
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=Videoware Monolithic Container
            org.opencontainers.image.description=Monolithic Docker container with PocketBase, Next.js, and Background Worker
            org.opencontainers.image.vendor=${{ github.repository_owner }}
          bake-target: monolith

      - name: Metadata - worker
        id: meta-worker
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker
          labels: |
            org.opencontainers.image.title=Videoware Worker Container
            org.opencontainers.image.description=Worker service container (NestJS + FFmpeg)
            org.opencontainers.image.vendor=${{ github.repository_owner }}
          bake-target: worker

      - name: Metadata - webapp
        id: meta-webapp
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-webapp
          labels: |
            org.opencontainers.image.title=Videoware Webapp Container
            org.opencontainers.image.description=Webapp container (Next.js)
            org.opencontainers.image.vendor=${{ github.repository_owner }}
          bake-target: webapp

      - name: Metadata - pocketbase
        id: meta-pocketbase
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-pocketbase
          labels: |
            org.opencontainers.image.title=Videoware PocketBase Container
            org.opencontainers.image.description=PocketBase container with custom hooks and migrations
            org.opencontainers.image.vendor=${{ github.repository_owner }}
          bake-target: pocketbase

      - name: Build and push by digest
        id: bake
        uses: docker/bake-action@v7
        env:
          PLATFORM: ${{ matrix.platform }}
          CACHE_SCOPE: videoware-${{ matrix.arch }}
        with:
          files: |
            ./docker/docker-bake.hcl
            cwd://${{ steps.meta-monolith.outputs.bake-file }}
            cwd://${{ steps.meta-worker.outputs.bake-file }}
            cwd://${{ steps.meta-webapp.outputs.bake-file }}
            cwd://${{ steps.meta-pocketbase.outputs.bake-file }}
          set: |
            *.tags=
            monolith.output=type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
            worker.output=type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker,push-by-digest=true,name-canonical=true,push=true
            webapp.output=type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-webapp,push-by-digest=true,name-canonical=true,push=true
            pocketbase.output=type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-pocketbase,push-by-digest=true,name-canonical=true,push=true

      - name: Export digests
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          metadata='${{ steps.bake.outputs.metadata }}'
          for target in monolith worker webapp pocketbase; do
            digest=$(echo "$metadata" | jq -r ".\"${target}\".\"containerimage.digest\"")
            if [ -z "$digest" ] || [ "$digest" = "null" ]; then
              echo "::error::Missing digest for target ${target}"
              exit 1
            fi
            mkdir -p "/tmp/digests/${target}"
            touch "/tmp/digests/${target}/${digest#sha256:}"
          done

      - name: Upload digests
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Combine the per-arch digests into one multi-arch manifest per image and
  # apply the release tags. Cheap and fast — no building happens here.
  # ---------------------------------------------------------------------------
  merge:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    # imagetools assembles an image index from pre-built per-arch digests, so
    # annotations must target the index level. The metadata-action default is
    # `manifest`, which imagetools rejects with "manifest annotations are not
    # supported yet" when creating a manifest list.
    env:
      DOCKER_METADATA_ANNOTATIONS_LEVELS: index
    steps:
      # Only the changelog is needed here (to compose the Docker Hub overview),
      # so sparse-checkout avoids cloning the whole tree.
      - name: Checkout changelog
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Optional Docker Hub mirror. Best-effort: a missing or invalid secret
      # fails this login softly (continue-on-error), and the mirror step below
      # is gated on this login succeeding — so the GHCR publish is never
      # blocked by Docker Hub.
      - name: Log in to Docker Hub
        id: dockerhub-login
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tag patterns
        id: tag-patterns
        run: |
          if [ "${{ inputs.version }}" = "nightly" ]; then
            # Nightly build: tag as `nightly` (and sha) but never `latest`.
            {
              echo "type=raw,value=nightly"
              echo "type=sha,prefix=sha-"
            } > /tmp/tag-patterns.txt
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            {
              echo "type=raw,value=${VERSION}"
              echo "type=raw,value=${MAJOR}.${MINOR}"
              echo "type=raw,value=${MAJOR}"
              echo "type=raw,value=latest"
              echo "type=sha,prefix=sha-"
            } > /tmp/tag-patterns.txt
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=sha,prefix=sha-" > /tmp/tag-patterns.txt
          else
            {
              echo "type=semver,pattern={{version}}"
              echo "type=semver,pattern={{major}}.{{minor}}"
              echo "type=semver,pattern={{major}}"
              echo "type=raw,value=latest"
              echo "type=sha,prefix=sha-"
            } > /tmp/tag-patterns.txt
          fi
          {
            echo "patterns<<EOF"
            cat /tmp/tag-patterns.txt
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Metadata - monolith
        id: meta-monolith
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ steps.tag-patterns.outputs.patterns }}

      - name: Metadata - worker
        id: meta-worker
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker
          tags: ${{ steps.tag-patterns.outputs.patterns }}

      - name: Metadata - webapp
        id: meta-webapp
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-webapp
          tags: ${{ steps.tag-patterns.outputs.patterns }}

      - name: Metadata - pocketbase
        id: meta-pocketbase
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-pocketbase
          tags: ${{ steps.tag-patterns.outputs.patterns }}

      # Same tag values as the GHCR monolith, just under the Docker Hub repo.
      - name: Metadata - Docker Hub monolith
        id: meta-dockerhub
        continue-on-error: true
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: ${{ steps.tag-patterns.outputs.patterns }}

      - name: Create and push multi-arch manifests
        run: |
          set -euo pipefail

          push_manifest() {
            local image="$1" tags="$2" annotations="$3" dir="$4"
            local args=()

            while IFS= read -r tag; do
              [ -n "$tag" ] && args+=("-t" "$tag")
            done <<< "$tags"

            while IFS= read -r ann; do
              [ -n "$ann" ] && args+=("--annotation" "$ann")
            done <<< "$annotations"

            local sources=()
            for f in "$dir"/*; do
              sources+=("${image}@sha256:$(basename "$f")")
            done

            echo "Creating manifest for ${image} from ${#sources[@]} digest(s)"
            docker buildx imagetools create "${args[@]}" "${sources[@]}"
            docker buildx imagetools inspect "$(echo "$tags" | head -n1)"
          }

          push_manifest "$IMG_MONOLITH"   "$TAGS_MONOLITH"   "$ANN_MONOLITH"   /tmp/digests/monolith
          push_manifest "$IMG_WORKER"     "$TAGS_WORKER"     "$ANN_WORKER"     /tmp/digests/worker
          push_manifest "$IMG_WEBAPP"     "$TAGS_WEBAPP"     "$ANN_WEBAPP"     /tmp/digests/webapp
          push_manifest "$IMG_POCKETBASE" "$TAGS_POCKETBASE" "$ANN_POCKETBASE" /tmp/digests/pocketbase
        env:
          IMG_MONOLITH: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TAGS_MONOLITH: ${{ steps.meta-monolith.outputs.tags }}
          ANN_MONOLITH: ${{ steps.meta-monolith.outputs.annotations }}
          IMG_WORKER: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker
          TAGS_WORKER: ${{ steps.meta-worker.outputs.tags }}
          ANN_WORKER: ${{ steps.meta-worker.outputs.annotations }}
          IMG_WEBAPP: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-webapp
          TAGS_WEBAPP: ${{ steps.meta-webapp.outputs.tags }}
          ANN_WEBAPP: ${{ steps.meta-webapp.outputs.annotations }}
          IMG_POCKETBASE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-pocketbase
          TAGS_POCKETBASE: ${{ steps.meta-pocketbase.outputs.tags }}
          ANN_POCKETBASE: ${{ steps.meta-pocketbase.outputs.annotations }}

      # Copy the freshly-pushed multi-arch monolith manifest from GHCR to
      # Docker Hub. imagetools copies the index and its blobs cross-registry,
      # so nothing is rebuilt. Best-effort: gated on a successful Docker Hub
      # login and continue-on-error, so it can never fail the job.
      - name: Mirror monolith to Docker Hub
        if: steps.dockerhub-login.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail

          args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && args+=("-t" "$tag")
          done <<< "$DH_TAGS"

          while IFS= read -r ann; do
            [ -n "$ann" ] && args+=("--annotation" "$ann")
          done <<< "$DH_ANNOTATIONS"

          # Use the first GHCR monolith tag as the copy source.
          src=$(echo "$GHCR_TAGS" | head -n1)

          echo "Mirroring ${src} to Docker Hub:"
          echo "$DH_TAGS"
          docker buildx imagetools create "${args[@]}" "$src"
          docker buildx imagetools inspect "$(echo "$DH_TAGS" | head -n1)"
        env:
          DH_TAGS: ${{ steps.meta-dockerhub.outputs.tags }}
          DH_ANNOTATIONS: ${{ steps.meta-dockerhub.outputs.annotations }}
          GHCR_TAGS: ${{ steps.meta-monolith.outputs.tags }}

      # Compose the Docker Hub overview from only the most recent release
      # section of the changelog. Pushing the full changelog would eventually
      # exceed Docker Hub's 25,000-byte cap and be blindly truncated, breaking
      # the markdown; one release section stays well under the limit.
      - name: Compose Docker Hub description
        if: steps.dockerhub-login.outcome == 'success'
        run: |
          set -euo pipefail

          # Most recent release: lines from the first "## [" version heading up
          # to (but not including) the next one.
          {
            echo "📦 Source: [github.com/make-ware/video-ware](https://github.com/make-ware/video-ware)"
            echo
            echo "# Changelog"
            echo
            awk '/^## \[/ { if (++seen == 2) exit } seen' CHANGELOG.md
          } > DOCKERHUB_README.md

          echo "Docker Hub description: $(wc -c < DOCKERHUB_README.md) bytes"

      # Best-effort: gated on a successful Docker Hub login and
      # continue-on-error, so it can never fail the job. The action truncates
      # content over Docker Hub's 25,000-byte limit and warns in the log.
      - name: Update Docker Hub description
        if: steps.dockerhub-login.outcome == 'success'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          readme-filepath: ./DOCKERHUB_README.md

      - name: Generate build summary
        run: |
          {
            echo "## Docker Build Summary"
            echo ""
            echo "Each architecture was built natively in parallel (no QEMU):"
            echo "- \`linux/amd64\` on \`ubuntu-latest\`"
            echo "- \`linux/arm64\` on \`ubuntu-24.04-arm\`"
            echo ""
            echo "Per-arch images were pushed by digest, then merged into one"
            echo "multi-arch manifest per image."
            echo ""
            echo "### Images"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` (monolith)"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-webapp\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-pocketbase\`"
            echo ""
            echo "### Tags"
            echo '```'
            echo "${{ steps.meta-monolith.outputs.tags }}"
            echo '```'
            echo ""
            echo "### Docker Hub mirror (best-effort)"
            echo "- \`${{ env.DOCKERHUB_IMAGE }}\` (monolith), login: ${{ steps.dockerhub-login.outcome }}"
          } >> $GITHUB_STEP_SUMMARY

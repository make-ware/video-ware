# Docker Compose configuration for Video Ware
# 
# This file uses pre-built images from GitHub Container Registry.
# Images are automatically built and published when releases are created.
# You can pull the latest images using:
#   docker compose pull

services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pocketbase:
    image: ghcr.io/make-ware/video-ware-pocketbase:latest
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./data:/data

    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Seed/update the superuser on startup so the worker can authenticate
      # without manual admin creation.
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: ghcr.io/make-ware/video-ware-worker:latest
    restart: unless-stopped
    ports:
      - "${BULL_BOARD_PORT:-3002}:3002"
    environment:
      - REDIS_URL=redis://redis:6379
      - POCKETBASE_URL=http://pocketbase:8090
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD}
      - BULL_BOARD_PORT=3002
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      # Point to the shared volume where PocketBase stores files
      - WORKER_DATA_DIR=/data/storage
      # One-time local->S3 migration scan; keep off for stateless S3 pods.
      - ENABLE_S3_MIGRATION=${ENABLE_S3_MIGRATION:-false}

      # Per-queue BullMQ worker concurrency (set WORKER_CONCURRENCY for all,
      # or override per queue). Increase to process more jobs per pod.
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-}
      - WORKER_CONCURRENCY_TRANSCODE=${WORKER_CONCURRENCY_TRANSCODE:-3}
      - WORKER_CONCURRENCY_RENDER=${WORKER_CONCURRENCY_RENDER:-2}
      - WORKER_CONCURRENCY_LABELS=${WORKER_CONCURRENCY_LABELS:-5}
      - WORKER_LOCK_DURATION_MS=${WORKER_LOCK_DURATION_MS:-60000}

      # Google Cloud Config
      - GOOGLE_PROJECT_ID=${GOOGLE_PROJECT_ID}
      - GOOGLE_CLOUD_CREDENTIALS=${GOOGLE_CLOUD_CREDENTIALS}
      - GCS_BUCKET=${GCS_BUCKET}
      # Processor Config
      - ENABLE_FFMPEG=${ENABLE_FFMPEG:-true}
      # Label detection processors. Compose only forwards variables listed
      # here — a flag set in the host .env but missing from this block never
      # reaches the worker, which silently skips that detection step.
      - ENABLE_LABEL_DETECTION=${ENABLE_LABEL_DETECTION:-false}
      - ENABLE_OBJECT_TRACKING=${ENABLE_OBJECT_TRACKING:-false}
      - ENABLE_FACE_DETECTION=${ENABLE_FACE_DETECTION:-false}
      - ENABLE_PERSON_DETECTION=${ENABLE_PERSON_DETECTION:-false}
      - ENABLE_TEXT_DETECTION=${ENABLE_TEXT_DETECTION:-false}
      - ENABLE_SPEECH_TRANSCRIPTION=${ENABLE_SPEECH_TRANSCRIPTION:-false}
      # Speaker-diarized STT (ElevenLabs) needs its API key alongside the flag
      - ENABLE_SPEAKER_TRANSCRIPTION=${ENABLE_SPEAKER_TRANSCRIPTION:-false}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
    volumes:
      # Mount the same volume as PocketBase to access local files
      - ./data:/data

    depends_on:
      redis:
        condition: service_healthy
      pocketbase:
        condition: service_healthy

  webapp:
    image: ghcr.io/make-ware/video-ware-webapp:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Public URL for the browser to access PocketBase
      - NEXT_PUBLIC_POCKETBASE_URL=${NEXT_PUBLIC_POCKETBASE_URL:-http://localhost:8090}
      # Internal URL for SSR to access PocketBase
      - POCKETBASE_URL=http://pocketbase:8090
      # MUST match the worker's storage config: the webapp's upload API routes
      # write files via the same storage backend the worker reads from. Without
      # these, uploads fall back to a relative path inside the webapp
      # container's ephemeral layer and the worker never finds them.
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - WORKER_DATA_DIR=/data/storage
    volumes:
      # Same volume as PocketBase/worker so webapp-written uploads are shared
      - ./data:/data
    depends_on:
      pocketbase:
        condition: service_healthy

volumes:
  redis_data:

